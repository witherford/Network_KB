<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network CLI Knowledge Base v4</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8f9fa;--card:#fff;--border:#e5e7eb;--border2:#d1d5db;--text:#1a1a1a;--text2:#555;--text3:#888;--header:#1e2a3a;--tab-active:#1e2a3a;--code:#1e3a6e;--hover:#fafbfc;--sel:#f0f4ff;--hl:#fff176;--sec-bg:#f9fafb}
.dark{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--border2:#3a3d4a;--text:#e8eaf0;--text2:#9aa0b8;--text3:#6b7280;--header:#0d111a;--tab-active:#2a3a5a;--code:#7bb3f0;--hover:#1e2130;--sel:#1e2d4a;--hl:#5a4e00;--sec-bg:#13151f}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;transition:background .2s,color .2s}
.header{background:var(--header);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header-left h1{font-size:17px;font-weight:600}
.header-left p{font-size:11px;opacity:.55;margin-top:2px}
.header-right{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.hbtn{background:none;border:1px solid rgba(255,255,255,.25);color:#ffffffbb;border-radius:6px;padding:5px 11px;cursor:pointer;font-size:12px;font-family:inherit;line-height:1.4;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.1)}
.hbtn.active{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5);color:#fff}
#searchInput{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);color:#fff;border-radius:6px;padding:6px 12px;font-size:13px;width:220px;outline:none;font-family:inherit}
#searchInput::placeholder{color:rgba(255,255,255,.35)}
#searchInput:focus{border-color:rgba(255,255,255,.45)}
.kbd{display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:1px 5px;font-size:11px;color:rgba(255,255,255,.6);margin-left:4px;font-family:monospace}
.stats-bar{background:var(--header);border-top:1px solid rgba(255,255,255,.08);padding:6px 20px;display:flex;gap:16px;flex-wrap:wrap}
.stat-pill{font-size:11px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:5px}
.stat-pill strong{color:rgba(255,255,255,.85);font-weight:600}
.tabs{display:flex;gap:4px;padding:8px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:0;z-index:100}
.tab{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);font-family:inherit;line-height:1.4}
.tab:hover{background:var(--hover)}
.tab.active{background:var(--tab-active);color:#fff;border-color:var(--tab-active)}
.tab .cnt{display:inline-block;background:var(--border);color:var(--text3);border-radius:10px;padding:1px 6px;font-size:11px;margin-left:4px}
.tab.active .cnt{background:rgba(255,255,255,.2);color:rgba(255,255,255,.8)}
.toolbar{padding:7px 18px;background:var(--card);border-bottom:1px solid var(--sec-bg);display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:40px}
.sel-count{font-size:12px;color:var(--text2)}
.tbtn{background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-family:inherit;line-height:1.4}
.tbtn:hover{background:var(--hover)}
.tbtn.danger{color:#b91c1c;border-color:#fca5a5}
.tbtn.danger:hover{background:#fef2f2}
.tbtn.star{color:#b45309;border-color:#fcd34d}
.tbtn.star:hover{background:#fffbeb}
.tbtn.export{color:#1d4ed8;border-color:#93c5fd}
.tbtn.export:hover{background:#eff6ff}
.match-info{font-size:12px;color:var(--text3);margin-left:auto}
.main{padding:16px 18px;max-width:1400px;margin:0 auto}
.platform-section{margin-bottom:24px}
.platform-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pbadge{padding:3px 9px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.4px}
.badge-ns{background:#fef3e2;color:#b45309}
.badge-pa{background:#fde8e8;color:#b91c1c}
.badge-ssl{background:#e8f5e9;color:#1b5e20}
.badge-sw{background:#e8eaf6;color:#283593}
.badge-wlc{background:#e0f2fe;color:#0369a1}
.badge-fav{background:#fdf4ff;color:#7e22ce}
.badge-hist{background:#f0fdf4;color:#166534}
.ptitle{font-size:15px;font-weight:600;color:var(--text)}
.pcnt{font-size:12px;color:var(--text3);margin-left:auto}
.pcollapse{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:2px 6px;border-radius:4px;font-family:inherit}
.pcollapse:hover{color:var(--text)}
.sections-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:8px}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.section-title{padding:8px 12px;font-size:12px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;color:var(--text);background:var(--sec-bg)}
.sec-actions{display:flex;align-items:center;gap:6px}
.sec-cnt{font-size:11px;color:var(--text3);font-weight:400}
.sec-copy-all{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text3);padding:2px 6px;border-radius:4px;font-family:inherit}
.sec-copy-all:hover{background:var(--hover);color:var(--text2)}
.sec-collapse{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:2px 4px;line-height:1}
.cmd-list{padding:2px 0}
.cmd-item{padding:7px 11px;border-bottom:1px solid var(--sec-bg);position:relative;cursor:pointer}
.cmd-item:last-child{border-bottom:none}
.cmd-item:hover{background:var(--hover)}
.cmd-item.selected{background:var(--sel)}
.cmd-item.flagged .cmd-code{text-decoration:line-through;opacity:.45}
.cmd-item.flagged::after{content:'Flagged';position:absolute;right:70px;top:8px;font-size:10px;color:#b91c1c;background:#fde8e8;border-radius:4px;padding:1px 6px;pointer-events:none}
.cmd-item.favourite .cmd-code::before{content:'★ ';color:#b45309}
.cmd-row{display:flex;align-items:flex-start;gap:7px}
.cmd-cb{margin-top:3px;width:13px;height:13px;cursor:pointer;flex-shrink:0;accent-color:#3b5bdb}
.cmd-body{flex:1;min-width:0;overflow:hidden}
.cmd-actions{flex-shrink:0;display:flex;gap:4px}
.cmd-code{font-family:'SF Mono',Consolas,'Courier New',monospace;font-size:11.5px;color:var(--code);font-weight:500;word-break:break-all;line-height:1.5;white-space:pre-wrap}
.cmd-desc{font-size:11.5px;color:var(--text2);margin-top:3px;line-height:1.5;display:none;white-space:normal}
.cmd-item.desc-on .cmd-desc{display:block}
.cbtn{background:var(--sec-bg);border:1px solid var(--border);color:var(--text2);border-radius:5px;padding:2px 8px;font-size:11px;cursor:pointer;font-family:inherit;line-height:1.4;white-space:nowrap}
.cbtn:hover{background:var(--hover)}
.cbtn.copied{background:#e6f9f0;border-color:#a3dfc3;color:#1a7f52}
.ctx-menu{position:fixed;background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);padding:4px 0;z-index:9999;min-width:185px}
.ctx-item{padding:7px 13px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:7px;color:var(--text)}
.ctx-item:hover{background:var(--hover)}
.ctx-item.danger{color:#b91c1c}
.ctx-item.star{color:#b45309}
.ctx-item.undo{color:#1d4ed8}
.ctx-divider{height:1px;background:var(--border);margin:3px 0}
.no-results{text-align:center;padding:50px 20px;color:var(--text3)}
.hl{background:var(--hl);border-radius:2px;padding:0 1px}
.history-bar{padding:8px 18px;background:var(--sec-bg);border-bottom:1px solid var(--border);font-size:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-height:36px}
.hist-label{color:var(--text3);font-size:11px}
.hist-chip{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2px 9px;font-size:11px;color:var(--code);cursor:pointer;font-family:monospace;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
.hist-chip:hover{border-color:var(--border2)}
.hist-clear{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;margin-left:auto;font-family:inherit}
.hist-clear:hover{color:var(--text)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:10000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;min-width:320px;max-width:480px;width:90%}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}
.modal textarea{width:100%;height:140px;font-size:12px;font-family:monospace;background:var(--sec-bg);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);resize:vertical}
.modal-footer{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.mbtn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:inherit}
.mbtn.primary{background:#1e2a3a;color:#fff;border-color:#1e2a3a}
.mbtn:hover{background:var(--hover)}
.mbtn.primary:hover{background:#2a3a4a}
@media(max-width:600px){.header-right{margin-left:0;width:100%}#searchInput{width:100%}.sections-grid{grid-template-columns:1fr}}

.modal.wide{min-width:560px;max-width:700px;width:94%}
.mgr-tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:10px}
.mgr-tab{background:none;border:1px solid var(--border);border-radius:20px;padding:4px 14px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);font-family:inherit}
.mgr-tab.active{background:var(--tab-active);color:#fff;border-color:var(--tab-active)}
.mgr-section{margin-bottom:14px}
.mgr-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.mgr-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.mgr-input{background:var(--sec-bg);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:12px;color:var(--text);font-family:inherit;outline:none;flex:1;min-width:0}
.mgr-input:focus{border-color:var(--border2)}
.mgr-input.full{width:100%;flex:none}
.mgr-select{background:var(--sec-bg);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:12px;color:var(--text);font-family:inherit;outline:none;min-width:140px}
.mgr-list{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px;max-height:180px;overflow-y:auto}
.mgr-list-item{display:flex;align-items:center;gap:8px;padding:7px 10px;font-size:12px;border-bottom:1px solid var(--sec-bg);color:var(--text)}
.mgr-list-item:last-child{border-bottom:none}
.mgr-list-item:hover{background:var(--hover)}
.mgr-list-item .item-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mgr-list-item .item-badge{font-size:10px;padding:1px 7px;border-radius:4px;font-weight:700}
.mgr-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:1px 4px;border-radius:4px;font-family:inherit;line-height:1}
.mgr-del:hover{color:#b91c1c;background:#fde8e8}
.mgr-del.disabled{opacity:.3;cursor:not-allowed}
.mgr-textarea{width:100%;height:160px;font-size:12px;font-family:'SF Mono',Consolas,monospace;background:var(--sec-bg);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);resize:vertical;line-height:1.6}
.mgr-hint{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5}
.mgr-success{font-size:12px;color:#1a7f52;background:#e6f9f0;border:1px solid #a3dfc3;border-radius:6px;padding:6px 10px;margin-top:8px;display:none}
.colour-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.colour-swatch{width:24px;height:24px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:border-color .15s}
.colour-swatch.selected{border-color:var(--text)}
.mgr-empty{font-size:12px;color:var(--text3);padding:10px;text-align:center}

/* drag-and-drop */
.cmd-drag-handle{display:flex;align-items:center;color:var(--text3);font-size:11px;padding:0 4px 0 0;cursor:grab;flex-shrink:0;opacity:.35;transition:opacity .15s;user-select:none;line-height:1;letter-spacing:-1px}
.cmd-drag-handle:hover{opacity:.9}
.cmd-item[draggable=true]{cursor:default}
.cmd-item.drag-over-above{box-shadow:inset 0 2px 0 0 #3b82f6;background:var(--sel)}
.cmd-item.drag-over-below{box-shadow:inset 0 -2px 0 0 #3b82f6;background:var(--sel)}
.cmd-list.drag-over-empty{background:var(--sel);outline:2px dashed #3b82f6;outline-offset:-3px;border-radius:6px;min-height:36px}
.cmd-item.dragging{opacity:.3}
.drag-mode-hint{position:fixed;bottom:14px;right:18px;background:#1e2a3a;color:#fff;font-size:11px;padding:6px 14px;border-radius:20px;pointer-events:none;z-index:99999;opacity:0;transition:opacity .2s;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.shift-hint{font-size:11px;color:var(--text3);background:var(--sec-bg);border:1px solid var(--border);border-radius:5px;padding:3px 8px;margin-left:6px}
.drag-mode-hint.visible{opacity:1}

/* Command type tabs */
.type-tabs{display:flex;gap:4px;padding:5px 16px;background:var(--sec-bg);border-bottom:1px solid var(--border);flex-wrap:wrap}
.type-tab{padding:3px 11px;border-radius:14px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:11px;font-weight:500;color:var(--text2);font-family:inherit;line-height:1.5}
.type-tab:hover{background:var(--hover)}
.type-tab.active{color:#fff;border-color:transparent}
.type-tab.tt-all.active{background:#374151}
.type-tab.tt-show.active{background:#0369a1}
.type-tab.tt-troubleshooting.active{background:#b45309}
.type-tab.tt-config.active{background:#166534}
.type-badge{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.3px;border-radius:3px;padding:1px 5px;margin-left:5px;vertical-align:middle;flex-shrink:0}
.tb-show{background:#e0f2fe;color:#0369a1}
.tb-troubleshooting{background:#fef3e2;color:#b45309}
.tb-config{background:#dcfce7;color:#166534}
.dark .tb-show{background:#0c2d40;color:#38bdf8}
.dark .tb-troubleshooting{background:#3a2800;color:#fbbf24}
.dark .tb-config{background:#052e16;color:#4ade80}
.cmd-type-select{background:var(--sec-bg);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-size:12px;color:var(--text);font-family:inherit;outline:none;min-width:120px}

/* Backup/restore modal */
.backup-zone{border:2px dashed var(--border2);border-radius:8px;padding:18px;text-align:center;cursor:pointer;font-size:13px;color:var(--text3);margin-bottom:10px;transition:border-color .2s,background .2s}
.backup-zone:hover,.backup-zone.drag-over{border-color:#3b82f6;background:var(--sel);color:var(--text)}
.backup-stats{font-size:12px;color:var(--text2);background:var(--sec-bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:10px;line-height:1.8}

/* Command list in manager */
.mgr-cmd-list-wrap{max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;margin-bottom:8px}
.mgr-cmd-list{padding:2px 0}
.mgr-cmd-row{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--sec-bg);font-size:12px}
.mgr-cmd-row:last-child{border-bottom:none}
.mgr-cmd-row:hover{background:var(--hover)}
.mgr-cmd-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'SF Mono',Consolas,monospace;color:var(--code);font-size:11.5px}

/* Duplicates tab */
.mgr-dup-group{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
.mgr-dup-header{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--sec-bg);border-bottom:1px solid var(--border)}
.mgr-dup-cmd{font-family:'SF Mono',Consolas,monospace;font-size:11.5px;color:var(--code);padding:6px 10px;background:var(--card);border-bottom:1px solid var(--sec-bg);font-weight:600}
.mgr-dup-entry{display:flex;align-items:center;gap:7px;padding:6px 10px;border-bottom:1px solid var(--sec-bg);background:var(--card)}
.mgr-dup-entry:last-child{border-bottom:none}
.mgr-dup-entry:hover{background:var(--hover)}
.mgr-dup-desc{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11.5px;color:var(--text2)}

/* ===== SCRAPER STYLES ===== */
.scraper-bar{background:linear-gradient(135deg,#1a2744 0%,#0f1a2e 100%);border-bottom:2px solid #1e3a6e;padding:9px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.fetch-btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:all .2s;box-shadow:0 2px 8px rgba(37,99,235,.35);white-space:nowrap}
.fetch-btn:hover:not(:disabled){background:linear-gradient(135deg,#3b82f6,#2563eb);box-shadow:0 4px 14px rgba(37,99,235,.5);transform:translateY(-1px)}
.fetch-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.fetch-btn .spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.scraper-info{font-size:11px;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;min-width:0}
.scraper-domain-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:10px;padding:2px 9px;font-size:10.5px;color:rgba(255,255,255,.6);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.scraper-domain-pill .domain-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0}
.scraper-domain-pill.disabled-pill .domain-dot{background:#6b7280}
.scraper-domain-pill.disabled-pill{opacity:.5}
.scraper-btn-small{background:none;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.55);border-radius:6px;padding:5px 11px;cursor:pointer;font-size:11px;font-family:inherit;white-space:nowrap;flex-shrink:0}
.scraper-btn-small:hover{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.35)}
.scraper-log{background:#070d1a;border:1px solid #1e3a6e;border-radius:8px;padding:10px 12px;max-height:180px;overflow-y:auto;font-family:'SF Mono',Consolas,monospace;font-size:11px;color:#7bb3f0;line-height:1.75;display:none}
.scraper-log .log-ok{color:#4ade80}
.scraper-log .log-warn{color:#fbbf24}
.scraper-log .log-err{color:#f87171}
.scraper-log .log-info{color:#60a5fa}
.scraper-log .log-dim{color:#374e6a}
/* Scraper settings modal */
.scr-modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:0;min-width:560px;max-width:760px;width:95%;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.scr-modal-head{background:linear-gradient(135deg,#1a2744,#0f1a2e);color:#fff;padding:15px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.scr-modal-head h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;margin:0}
.scr-modal-body{padding:18px 20px;overflow-y:auto;flex:1}
.scr-modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0;background:var(--sec-bg)}
.scr-section{margin-bottom:18px}
.scr-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.scr-domain-card{background:var(--sec-bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px;transition:border-color .15s}
.scr-domain-card:hover{border-color:var(--border2)}
.scr-domain-card.disabled-card{opacity:.6}
.scr-domain-head{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;user-select:none}
.scr-domain-head:hover{background:var(--hover)}
.scr-domain-badge{font-size:10px;font-weight:700;letter-spacing:.3px;border-radius:5px;padding:2px 8px;flex-shrink:0}
.scr-domain-url{flex:1;font-family:'SF Mono',Consolas,monospace;font-size:11px;color:var(--code);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.scr-domain-body{padding:0 14px 12px;border-top:1px solid var(--border);display:none}
.scr-domain-body.open{display:block;padding-top:10px}
.scr-input{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:12px;color:var(--text);font-family:inherit;outline:none;width:100%;margin-bottom:6px;transition:border-color .15s}
.scr-input:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.1)}
.scr-row{display:flex;gap:6px;align-items:flex-end;margin-bottom:6px}
.scr-hint{font-size:11px;color:var(--text3);line-height:1.55;margin-top:3px}
.scr-result-card{background:var(--sec-bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:5px}
.scr-result-cmd{font-family:'SF Mono',Consolas,monospace;font-size:11.5px;color:var(--code);word-break:break-all}
.scr-result-desc{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4}
.scr-result-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.scr-toggle{position:relative;display:inline-block;width:34px;height:18px;flex-shrink:0}
.scr-toggle input{opacity:0;width:0;height:0}
.scr-toggle-slider{position:absolute;cursor:pointer;inset:0;background:#cbd5e1;border-radius:18px;transition:.2s}
.scr-toggle-slider::before{content:'';position:absolute;height:14px;width:14px;left:2px;bottom:2px;background:white;border-radius:50%;transition:.2s}
.scr-toggle input:checked+.scr-toggle-slider{background:#2563eb}
.scr-toggle input:checked+.scr-toggle-slider::before{transform:translateX(16px)}
.progress-bar-wrap{background:rgba(255,255,255,.08);border-radius:4px;height:5px;overflow:hidden;flex:1;min-width:80px}
.progress-bar-fill{height:5px;border-radius:4px;background:linear-gradient(90deg,#2563eb,#38bdf8);transition:width .5s ease}
/* fetch history */
.fetch-hist-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--sec-bg);font-size:11.5px;color:var(--text2)}
.fetch-hist-item:last-child{border-bottom:none}
.fetch-hist-item:hover{background:var(--hover)}
.fetch-hist-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fetch-hist-dot.ok{background:#22c55e}
.fetch-hist-dot.err{background:#f87171}
.fetch-hist-domain{flex:1;font-family:monospace;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fetch-hist-count{font-size:11px;color:#22c55e;font-weight:600;white-space:nowrap}
.fetch-hist-time{font-size:10.5px;color:var(--text3);white-space:nowrap}
/* section hints */
.scr-sec-hint-tag{display:inline-flex;align-items:center;gap:4px;background:var(--sec-bg);border:1px solid var(--border);border-radius:10px;padding:2px 8px;font-size:11px;color:var(--text2);margin:2px;cursor:pointer}
.scr-sec-hint-tag:hover{border-color:#3b82f6;color:#3b82f6}
.scr-sec-hint-tag .rm{color:var(--text3);font-size:12px}

</style>
</head>

function hlText(s){if(!searchQuery)return esc(s);var safe=esc(s);var q=searchQuery.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return safe.replace(new RegExp('('+q+')','gi'),'<span class="hl">$1</span>');}

var _lastSelectedId=null;
function toggleSelect(id,ev){
  ev.stopPropagation();
  if(ev.shiftKey&&_lastSelectedId!==null){
    // Shift-click: select range between _lastSelectedId and id
    var allIds=[];
    document.querySelectorAll('.cmd-item[id^="ci_"]').forEach(function(el){allIds.push(el.id.replace('ci_',''));});
    var a=allIds.indexOf(_lastSelectedId),b=allIds.indexOf(id);
    if(a>-1&&b>-1){
      var lo=Math.min(a,b),hi=Math.max(a,b);
      for(var i=lo;i<=hi;i++){
        selected[allIds[i]]=true;
        var el=document.getElementById('ci_'+allIds[i]);
        if(el)el.classList.add('selected');
      }
    }
  } else {
    if(selected[id])delete selected[id];
    else selected[id]=true;
    var el=document.getElementById('ci_'+id);
    if(el){if(selected[id])el.classList.add('selected');else el.classList.remove('selected');}
    _lastSelectedId=selected[id]?id:_lastSelectedId;
  }
  updateToolbar();
}

// Boot is handled after IndexedDB load below — see _loadFromStorage callback
// renderStats();renderTabs();render();
var _db=null;
var DB_NAME='NetworkKB',DB_VER=1,STORE_NAME='userData';

function _openDB(cb){
  if(_db){cb(_db);return;}
  var req=indexedDB.open(DB_NAME,DB_VER);
  req.onupgradeneeded=function(e){e.target.result.createObjectStore(STORE_NAME);};
  req.onsuccess=function(e){_db=e.target.result;cb(_db);};
  req.onerror=function(){console.warn('IndexedDB unavailable — changes will not persist.');};
}

function _saveToStorage(){
  // Only persist custom platforms, custom sections, and user-added commands
  var payload={customPlatforms:{},customSections:{},userCommands:{}};
  Object.keys(RAW).forEach(function(pk){
    var p=RAW[pk];
    if(p._custom){
      payload.customPlatforms[pk]={label:p.label,badge:p.badge,short:p.short};
    }
    payload.userCommands[pk]={};
    if(p._customSections){
      payload.customSections[pk]=Object.keys(p._customSections);
    }
    Object.keys(p.sections).forEach(function(sec){
      var isCustomSec=!!(p._customSections&&p._customSections[sec]);
      var cmds=p.sections[sec];
      // Store all commands for custom platforms/sections, or user-added ones (3-element arrays)
      var toSave=[];
      cmds.forEach(function(c){
        if(p._custom||isCustomSec||c.length===3&&c[2]){
          toSave.push(c);
        }
      });
      if(toSave.length>0||isCustomSec)payload.userCommands[pk][sec]=toSave;
    });
  });
  _openDB(function(db){
    var tx=db.transaction(STORE_NAME,'readwrite');
    tx.objectStore(STORE_NAME).put(JSON.stringify(payload),'userData');
  });
}

function _loadFromStorage(cb){
  _openDB(function(db){
    var tx=db.transaction(STORE_NAME,'readonly');
    var req=tx.objectStore(STORE_NAME).get('userData');
    req.onsuccess=function(e){
      if(!e.target.result){cb();return;}
      try{
        var payload=JSON.parse(e.target.result);
        // Restore custom platforms
        if(payload.customPlatforms){
          Object.keys(payload.customPlatforms).forEach(function(pk){
            if(!RAW[pk]){
              var p=payload.customPlatforms[pk];
              RAW[pk]={label:p.label,badge:p.badge,short:p.short,sections:{},_custom:true};
            }
          });
        }
        // Restore custom sections
        if(payload.customSections){
          Object.keys(payload.customSections).forEach(function(pk){
            if(!RAW[pk])return;
            payload.customSections[pk].forEach(function(sec){
              if(!RAW[pk].sections[sec])RAW[pk].sections[sec]=[];
              if(!RAW[pk]._customSections)RAW[pk]._customSections={};
              RAW[pk]._customSections[sec]=true;
            });
          });
        }
        // Restore user commands
        if(payload.userCommands){
          Object.keys(payload.userCommands).forEach(function(pk){
            if(!RAW[pk])return;
            var secs=payload.userCommands[pk];
            Object.keys(secs).forEach(function(sec){
              if(!RAW[pk].sections[sec])RAW[pk].sections[sec]=[];
              var existing=RAW[pk].sections[sec];
              var toAdd=secs[sec];
              toAdd.forEach(function(newCmd){
                // Avoid duplicates
                var dup=existing.some(function(e){return e[0]===newCmd[0]&&e[1]===newCmd[1];});
                if(!dup)existing.push(newCmd);
              });
            });
          });
        }
      }catch(err){console.warn('Failed to restore saved data:',err);}
      cb();
    };
    req.onerror=function(){cb();};
  });
}

// Load saved data then boot
_loadFromStorage(function(){
  _rebuildStore=_rebuildStore; // already patched to call _saveToStorage
  // Re-init cmdStore with restored data
  cmdStore=[];INDEX={};
  var pk=Object.keys(RAW);
  for(var p=0;p<pk.length;p++){
    var s=RAW[pk[p]].sections;var sk=Object.keys(s);
    for(var si=0;si<sk.length;si++){
      var cmds=s[sk[si]];
      for(var c=0;c<cmds.length;c++){
        var n=cmdStore.length;
        cmdStore.push({pKey:pk[p],section:sk[si],cmd:cmds[c][0],desc:cmds[c][1],cmdType:cmds[c][2]||'show'});
        INDEX[String(n)]=n;
      }
    }
  }
  renderStats();renderTabs();render();
});

function _csvEscape(s){
  s=String(s||'');
  if(s.indexOf(',')!==-1||s.indexOf('"')!==-1||s.indexOf('\n')!==-1){
    return '"'+s.replace(/"/g,'""')+'"';
  }
  return s;
}

function _csvExport(){
  var rows=['platform_key,platform_label,section,command,description,type'];
  Object.keys(RAW).forEach(function(pk){
    var p=RAW[pk];
    Object.keys(p.sections).forEach(function(sec){
      p.sections[sec].forEach(function(c){
        rows.push([_csvEscape(pk),_csvEscape(p.label),_csvEscape(sec),_csvEscape(c[0]),_csvEscape(c[1]),_csvEscape(c[2]||'show')].join(','));
      });
    });
  });
  var csv=rows.join('\n');
  var d=new Date();
  var stamp=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  download('network-kb-backup-'+stamp+'.csv',csv);
}

function _csvDragOver(e){e.preventDefault();document.getElementById('csvDropZone').classList.add('drag-over');}
function _csvDragLeave(e){document.getElementById('csvDropZone').classList.remove('drag-over');}
function _csvDrop(e){
  e.preventDefault();
  document.getElementById('csvDropZone').classList.remove('drag-over');
  var f=e.dataTransfer.files[0];
  if(f)_csvProcess(f);
}
function _csvFileChosen(inp){
  var f=inp.files[0];
  if(f)_csvProcess(f);
}

function _csvParseLine(line){
  var cols=[],cur='',inQ=false;
  for(var i=0;i<line.length;i++){
    var ch=line[i];
    if(inQ){
      if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++;}else{inQ=false;}}
      else{cur+=ch;}
    } else {
      if(ch===','){cols.push(cur);cur='';}
      else if(ch==='"'){inQ=true;}
      else{cur+=ch;}
    }
  }
  cols.push(cur);
  return cols;
}

function _csvProcess(file){
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
    if(lines.length<2){alert('CSV appears empty.');return;}
    var header=_csvParseLine(lines[0]).map(function(h){return h.trim().toLowerCase();});
    var pkIdx=header.indexOf('platform_key');
    var plIdx=header.indexOf('platform_label');
    var secIdx=header.indexOf('section');
    var cmdIdx=header.indexOf('command');
    var descIdx=header.indexOf('description');
    var typeIdx=header.indexOf('type');
    if(pkIdx===-1||secIdx===-1||cmdIdx===-1){
      alert('CSV missing required columns (platform_key, section, command). Please use a backup exported from this app.');
      return;
    }
    var added=0,skipped=0,newPlats=0,newSecs=0;
    for(var i=1;i<lines.length;i++){
      var cols=_csvParseLine(lines[i]);
      var pk=(cols[pkIdx]||'').trim();
      var pl=(plIdx>=0?(cols[plIdx]||'').trim():pk)||pk;
      var sec=(cols[secIdx]||'').trim();
      var cmd=(cols[cmdIdx]||'').trim();
      var desc=(descIdx>=0?(cols[descIdx]||'').trim():'');
      var type=(typeIdx>=0?(cols[typeIdx]||'').trim():'show');
      if(!pk||!sec||!cmd){skipped++;continue;}
      // Create platform if missing
      if(!RAW[pk]){RAW[pk]={label:pl,badge:'badge-ns',short:pl.substring(0,8),sections:{},_custom:true};newPlats++;}
      // Create section if missing
      if(!RAW[pk].sections[sec]){
        RAW[pk].sections[sec]=[];
        if(!RAW[pk]._customSections)RAW[pk]._customSections={};
        RAW[pk]._customSections[sec]=true;
        newSecs++;
      }
      // Skip duplicates
      var dup=RAW[pk].sections[sec].some(function(c){return c[0]===cmd;});
      if(dup){skipped++;continue;}
      RAW[pk].sections[sec].push([cmd,desc,type]);
      added++;
    }
    _rebuildStore();renderTabs();render();
    var msg='Import complete: '+added+' command'+(added!==1?'s':'')+' added';
    if(newPlats)msg+=', '+newPlats+' new platform'+(newPlats!==1?'s':'');
    if(newSecs)msg+=', '+newSecs+' new section'+(newSecs!==1?'s':'');
    if(skipped)msg+=', '+skipped+' skipped (duplicates or invalid)';
    var s=document.getElementById('csvImportSuccess');
    if(s){s.textContent=msg;s.style.display='block';}
    var prev=document.getElementById('csvPreview');
    if(prev)prev.innerHTML='';
  };
  reader.readAsText(file);
}

var _drag={active:false,cid:null,srcPk:null,srcSec:null,srcIdx:null,el:null};

function _dndHint(msg){
  var h=document.getElementById('dndHint');
  if(!h){h=document.createElement('div');h.id='dndHint';h.className='drag-mode-hint';document.body.appendChild(h);}
  if(msg){h.textContent=msg;h.classList.add('visible');}
  else{h.classList.remove('visible');}
}

function _dndDragStart(e,cid){
  var entry=cmdStore[parseInt(cid,10)];
  // If dragging a selected item, drag ALL selected items together
  var dragIds=(Object.keys(selected).length>0&&selected[cid])?Object.keys(selected):[cid];
  _drag={active:true,cid:cid,srcPk:entry.pKey,srcSec:entry.section,srcIdx:null,el:document.getElementById('ci_'+cid),multi:dragIds};
  var srcArr=RAW[_drag.srcPk].sections[_drag.srcSec];
  for(var i=0;i<srcArr.length;i++){
    if(srcArr[i][0]===entry.cmd&&srcArr[i][1]===entry.desc){_drag.srcIdx=i;break;}
  }
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',cid);
  setTimeout(function(){
    dragIds.forEach(function(id){var el=document.getElementById('ci_'+id);if(el)el.classList.add('dragging');});
  },0);
  var n=dragIds.length;
  _dndHint(n>1?'Moving '+n+' commands — drop to place':'Move to any section — drop to place');
}

function _dndDragEnd(){
  (_drag.multi||[_drag.cid]).forEach(function(id){var el=document.getElementById('ci_'+id);if(el)el.classList.remove('dragging');});
  _clearDndHL();
  _drag={active:false,cid:null,srcPk:null,srcSec:null,srcIdx:null,el:null,multi:[]};
  _dndHint('');
}

function _dndDragOver(e,targetCid){
  if(!_drag.active)return;
  e.preventDefault();e.stopPropagation();e.dataTransfer.dropEffect='move';
  _clearDndHL();
  if(targetCid===_drag.cid)return;
  var el=document.getElementById('ci_'+targetCid);
  if(!el)return;
  var rect=el.getBoundingClientRect();
  var above=e.clientY<rect.top+rect.height/2;
  el.classList.add(above?'drag-over-above':'drag-over-below');
  el._dndPos=above?'above':'below';
}

function _dndDragOverList(e,pk,sec){
  if(!_drag.active)return;
  e.preventDefault();e.stopPropagation();e.dataTransfer.dropEffect='move';
  _clearDndHL();
  var el=document.getElementById('cl_'+pk+'__'+sec);
  if(el)el.classList.add('drag-over-empty');
}

function _dndDropOnItem(e,targetCid){
  if(!_drag.active)return;
  e.preventDefault();e.stopPropagation();
  var tEntry=cmdStore[parseInt(targetCid,10)];
  var tPk=tEntry.pKey,tSec=tEntry.section;
  var tArr=RAW[tPk].sections[tSec];
  var tIdx=null;
  for(var i=0;i<tArr.length;i++){
    if(tArr[i][0]===tEntry.cmd&&tArr[i][1]===tEntry.desc){tIdx=i;break;}
  }
  if(tIdx===null)return;
  var targetEl=document.getElementById('ci_'+targetCid);
  var insertAfter=targetEl&&targetEl._dndPos==='below';
  _doMove(tPk,tSec,tIdx,insertAfter);
}

function _dndDropOnList(e,pk,sec){
  if(!_drag.active)return;
  e.preventDefault();e.stopPropagation();
  _doMove(pk,sec,RAW[pk].sections[sec].length-1,true);
}

function _doMove(tPk,tSec,tIdx,insertAfter){
  _clearDndHL();
  var dragIds=_drag.multi&&_drag.multi.length?_drag.multi:[_drag.cid];
  // Collect all entries to move (in order)
  var toMove=[];
  dragIds.forEach(function(id){
    var e=cmdStore[parseInt(id,10)];if(!e)return;
    var arr=RAW[e.pKey].sections[e.section];
    for(var i=0;i<arr.length;i++){
      if(arr[i][0]===e.cmd&&arr[i][1]===e.desc){toMove.push({pk:e.pKey,sec:e.section,idx:i,entry:arr[i]});break;}
    }
  });
  if(!toMove.length)return;
  // Remove from sources (process in reverse index order per section to avoid index shift)
  var bySec={};
  toMove.forEach(function(m){var k=m.pk+'||'+m.sec;if(!bySec[k])bySec[k]=[];bySec[k].push(m);});
  Object.keys(bySec).forEach(function(k){
    bySec[k].sort(function(a,b){return b.idx-a.idx;});
    bySec[k].forEach(function(m){RAW[m.pk].sections[m.sec].splice(m.idx,1);});
  });
  // Insert at destination
  var destArr=RAW[tPk].sections[tSec];
  // Recalculate tIdx after removal (if same section)
  var removed=0;
  toMove.forEach(function(m){if(m.pk===tPk&&m.sec===tSec&&m.idx<=tIdx)removed++;});
  var destAt=Math.max(0,Math.min(tIdx-removed+(insertAfter?1:0),destArr.length));
  toMove.forEach(function(m,i){destArr.splice(destAt+i,0,m.entry);});
  selected={};
  _rebuildStore();renderTabs();render();
}

function _clearDndHL(){
  document.querySelectorAll('.drag-over-above,.drag-over-below,.drag-over-empty').forEach(function(el){
    el.classList.remove('drag-over-above','drag-over-below','drag-over-empty');
  });
}

function _mgrAddGroup(){
  var platEl=document.getElementById('mgrGPlat');
  var pk=platEl?platEl.value:'';
  var name=(document.getElementById('mgrGName').value||'').trim();
  if(!pk||!RAW[pk]){alert('Select a platform first.');return;}
  if(!name){alert('Enter a group name.');return;}
  if(RAW[pk].sections[name]!==undefined){alert('Group "'+name+'" already exists in this platform.');return;}
  RAW[pk].sections[name]=[];
  if(!RAW[pk]._customSections)RAW[pk]._customSections={};
  RAW[pk]._customSections[name]=true;
  document.getElementById('mgrBody').innerHTML=_renderMgrBody();
  // re-select the same platform after re-render
  var pl=document.getElementById('mgrGPlat');if(pl)pl.value=pk;
  var s=document.getElementById('mgrGSuccess');if(s){s.style.display='block';setTimeout(function(){s.style.display='none';},2500);}
}

function _mgrDelGroup(pk,sec){
  if(!RAW[pk]||!RAW[pk].sections[sec]||RAW[pk].sections[sec].length>0)return;
  delete RAW[pk].sections[sec];
  if(RAW[pk]._customSections)delete RAW[pk]._customSections[sec];
  document.getElementById('mgrBody').innerHTML=_renderMgrBody();
}

var _mgrCurPk='';var _mgrCurSec='';

function _mgrGetCmdTargets(){
  var platEl=document.getElementById('mgrCPlat');
  var secEl=document.getElementById('mgrCSec');
  var pk=platEl?platEl.value:_mgrCurPk;
  var sec=secEl?secEl.value:_mgrCurSec;
  if(pk)_mgrCurPk=pk;
  if(sec)_mgrCurSec=sec;
  return {pk:pk||_mgrCurPk,sec:sec||_mgrCurSec};
}

function _mgrChangeCmdType(pk,sec,idx,newType){
  if(!RAW[pk]||!RAW[pk].sections[sec])return;
  var cmds=RAW[pk].sections[sec];
  if(idx<0||idx>=cmds.length)return;
  if(cmds[idx].length<3)cmds[idx].push(newType);
  else cmds[idx][2]=newType;
  _rebuildStore();renderTabs();render();
  document.getElementById('mgrBody').innerHTML=_renderMgrBody();
  var pl=document.getElementById('mgrCPlat');if(pl)pl.value=pk;
  var sl=document.getElementById('mgrCSec');if(sl)sl.value=sec;
  var s=document.getElementById('mgrCEditSuccess');
  if(s){s.textContent='Command type updated!';s.style.display='block';setTimeout(function(){s.style.display='none';},2000);}
}

function _mgrDelCmd(pk,sec,idx){
  if(!RAW[pk]||!RAW[pk].sections[sec])return;
  var cmds=RAW[pk].sections[sec];
  if(idx<0||idx>=cmds.length)return;
  if(!confirm('Delete command: "'+cmds[idx][0]+'"?'))return;
  cmds.splice(idx,1);
  _rebuildStore();renderTabs();render();
  document.getElementById('mgrBody').innerHTML=_renderMgrBody();
  if(mgrTab==='commands'){
    var pl=document.getElementById('mgrCPlat');if(pl)pl.value=pk;
    var sl=document.getElementById('mgrCSec');if(sl)sl.value=sec;
    var s=document.getElementById('mgrCEditSuccess');
    if(s){s.textContent='Command deleted.';s.style.display='block';setTimeout(function(){s.style.display='none';},2000);}
  }
}

function _mgrBulkAdd(){
  var t=_mgrGetCmdTargets();
  if(!t.pk||!RAW[t.pk]){alert('Select a platform.');return;}
  if(!t.sec||!RAW[t.pk].sections[t.sec]){alert('Select a group / section.');return;}
  var raw=(document.getElementById('mgrBulkTA').value||'').trim();
  if(!raw){alert('Paste some commands first.');return;}
  var cmdType=mgrBulkTypeVal||'show';
  var lines=raw.split('\n');
  var added=0;var skipped=0;
  lines.forEach(function(line){
    line=line.trim();
    if(!line)return;
    var parts=line.split(' — ');
    var cmd=parts[0].trim();
    var desc=(parts[1]||'').trim();
    if(!cmd){skipped++;return;}
    RAW[t.pk].sections[t.sec].push([cmd,desc,cmdType]);
    added++;
  });
  _rebuildStore();renderTabs();render();
  document.getElementById('mgrBulkTA').value='';
  var selPk=t.pk,selSec=t.sec;
  document.getElementById('mgrBody').innerHTML=_renderMgrBody();
  var pl=document.getElementById('mgrCPlat');if(pl)pl.value=selPk;
  var sl=document.getElementById('mgrCSec');if(sl)sl.value=selSec;
  var s=document.getElementById('mgrCSuccess');
  if(s){s.textContent=added+' command'+(added!==1?'s':'')+' added as "'+cmdType+'"'+(skipped?' ('+skipped+' skipped)':'')+'!';s.style.display='block';setTimeout(function(){s.style.display='none';},3000);}
}

function _mgrAddOne(){
  var t=_mgrGetCmdTargets();
  if(!t.pk||!RAW[t.pk]){alert('Select a platform.');return;}
  if(!t.sec||!RAW[t.pk].sections[t.sec]){alert('Select a group / section.');return;}
  var cmd=(document.getElementById('mgrCCmd').value||'').trim();
  var desc=(document.getElementById('mgrCDesc').value||'').trim();
  var cmdType=mgrSingleTypeVal||'show';
  if(!cmd){alert('Enter a command.');return;}
  RAW[t.pk].sections[t.sec].push([cmd,desc,cmdType]);
  _rebuildStore();renderTabs();render();
  var selPk=t.pk,selSec=t.sec;
  document.getElementById('mgrBody').innerHTML=_renderMgrBody();
  var pl=document.getElementById('mgrCPlat');if(pl)pl.value=selPk;
  var sl=document.getElementById('mgrCSec');if(sl)sl.value=selSec;
  var s=document.getElementById('mgrCOneSuccess');if(s){s.style.display='block';setTimeout(function(){s.style.display='none';},2500);}
}

// ---- DUPLICATES TAB ----
function _renderDuplicatesTab(){
  var pKeys=Object.keys(RAW);
  var pOpts='<option value="__all__">— All Platforms —</option>'+pKeys.map(function(pk){return '<option value="'+pk+'">'+esc(RAW[pk].label)+'</option>';}).join('');
  var dupFilterEl=document.getElementById('mgrDupPlat');
  var selDupPk=dupFilterEl?dupFilterEl.value:'__all__';

  // Find duplicates: same command text within same platform+section
  var dupGroups=[];
  pKeys.forEach(function(pk){
    if(selDupPk!=='__all__'&&selDupPk!==pk)return;
    var p=RAW[pk];
    Object.keys(p.sections).forEach(function(sec){
      var cmds=p.sections[sec];
      var seen={};
      cmds.forEach(function(c,idx){
        var key=c[0].trim().toLowerCase();
        if(!seen[key])seen[key]=[];
        seen[key].push({idx:idx,cmd:c[0],desc:c[1],type:c[2]||'show'});
      });
      Object.keys(seen).forEach(function(key){
        if(seen[key].length>1){
          dupGroups.push({pk:pk,sec:sec,platLabel:p.label,badge:p.badge,short:p.short,cmd:key,entries:seen[key]});
        }
      });
    });
  });

  var dupHtml='';
  if(dupGroups.length===0){
    dupHtml='<div style="text-align:center;padding:30px 20px;color:var(--text3)">'+
      '<div style="font-size:28px;margin-bottom:8px">&#10003;</div>'+
      '<div style="font-size:13px">No duplicate commands found'+(selDupPk!=='__all__'?' in this platform':'')+'.</div>'+
    '</div>';
  } else {
    dupHtml='<div style="font-size:12px;color:var(--text3);margin-bottom:10px">'+dupGroups.length+' duplicate group'+(dupGroups.length!==1?'s':'')+' found — click &#128465; to delete a copy.</div>';
    dupGroups.forEach(function(dg){
      dupHtml+='<div class="mgr-dup-group">'+
        '<div class="mgr-dup-header">'+
          '<span class="pbadge '+dg.badge+'" style="font-size:10px;padding:2px 7px">'+esc(dg.short)+'</span>'+
          '<span style="font-size:12px;font-weight:600;color:var(--text)">'+esc(dg.sec)+'</span>'+
          '<span class="type-badge" style="background:#fde8e8;color:#b91c1c;margin-left:4px">'+dg.entries.length+'x DUPLICATE</span>'+
        '</div>'+
        '<div class="mgr-dup-cmd">'+esc(dg.cmd)+'</div>';
      dg.entries.forEach(function(e){
        var tbClass='tb-'+e.type;
        var typeLabel=e.type==='troubleshooting'?'TSHOOT':e.type==='config'?'CONFIG':'SHOW';
        dupHtml+='<div class="mgr-dup-entry">'+
          '<span class="type-badge '+tbClass+'">'+typeLabel+'</span>'+
          '<span class="mgr-dup-desc">'+(e.desc?esc(e.desc):'<em style="color:var(--text3)">no description</em>')+'</span>'+
          '<button class="mgr-del" style="color:#b91c1c;flex-shrink:0" title="Delete this copy" onclick="_mgrDelCmd(\''+esc(dg.pk)+'\',\''+esc(dg.sec)+'\','+e.idx+')">&#128465;</button>'+
        '</div>';
      });
      dupHtml+='</div>';
    });
  }

  return '<div class="mgr-section">'+
    '<div class="mgr-label">Filter by Platform</div>'+
    '<select class="mgr-select" id="mgrDupPlat" style="width:100%;margin-bottom:12px" onchange="_mgrBody()">'+pOpts+'</select>'+
    dupHtml+
  '</div>';
}

function _rebuildStore(){
  cmdStore=[];INDEX={};
  var pk_list=Object.keys(RAW);
  for(var p=0;p<pk_list.length;p++){
    var pk=pk_list[p];var s=RAW[pk].sections;var sk=Object.keys(s);
    for(var si=0;si<sk.length;si++){
      var cmds=s[sk[si]];
      for(var c=0;c<cmds.length;c++){
        var n=cmdStore.length;
        cmdStore.push({pKey:pk,section:sk[si],cmd:cmds[c][0],desc:cmds[c][1],cmdType:cmds[c][2]||'show'});
        INDEX[String(n)]=n;
      }
    }
  }
  _saveToStorage();
}

            r5.onsuccess=function(e5){
              scraperAiProvider=e5.target.result||'openrouter';
              if(cb)cb();
            };
            r5.onerror=function(){ if(cb)cb(); };
          };
          r4.onerror=function(){ if(cb)cb(); };
        };
        r3.onerror=function(){ if(cb)cb(); };
      };
      r2.onerror=function(){ scraperHistory=[]; if(cb)cb(); };
    };
    r1.onerror=function(){ scraperDomains=[]; scraperHistory=[]; if(cb)cb(); };
  });
}

function _saveScraperDomains(){
  _openDB(function(db){
    var tx=db.transaction(STORE_NAME,'readwrite');
    var s=tx.objectStore(STORE_NAME);
    s.put(JSON.stringify(scraperDomains), SCRAPER_DB_KEY);
    s.put(JSON.stringify(scraperHistory.slice(0,50)), SCRAPER_HIST_KEY);
    if(scraperWorkerUrl)s.put(scraperWorkerUrl, WORKER_URL_KEY);
    s.put(scraperAiKey, AI_KEY_KEY);
    s.put(scraperAiProvider, AI_PROVIDER_KEY);
  });
}

}

function _toggleDomainCard(id){
  var el=document.getElementById(id);
  if(el)el.classList.toggle('open');
}

function _scrToggleDomain(id,val){
  var d=scraperDomains.find(function(x){return x.id===id;});
  if(!d)return;
  d.enabled=val;
  _saveScraperDomains();
  _renderScraperPills();
  var wrap=document.getElementById('dcard_wrap_'+id);
  if(wrap){if(val)wrap.classList.remove('disabled-card');else wrap.classList.add('disabled-card');}
}

function _scraperSaveDomainEdit(id){
  var d=scraperDomains.find(function(x){return x.id===id;});
  if(!d)return;
  var newUrl=(document.getElementById('dedit_url_'+id)||{value:''}).value.trim();
  var newPlat=(document.getElementById('dedit_plat_'+id)||{value:''}).value.trim();
  if(!newUrl||!/^https?:\/\//.test(newUrl)){alert('Enter a valid URL.');return;}
  if(!newPlat||!RAW[newPlat]){alert('Select a valid platform.');return;}
  d.url=newUrl;d.platformKey=newPlat;
  _saveScraperDomains();_renderScraperPills();_renderScraperModal();
}

function _scrAddHint(id){
  var d=scraperDomains.find(function(x){return x.id===id;});
  if(!d)return;
  var inp=document.getElementById('scr_hint_inp_'+id);
  var val=inp?inp.value.trim():'';
  if(!val)return;
  if(!d.sectionHints)d.sectionHints=[];
  if(d.sectionHints.indexOf(val)===-1)d.sectionHints.push(val);
  _saveScraperDomains();
  var hintEl=document.getElementById('scr_hints_'+id);
  if(hintEl)hintEl.innerHTML=d.sectionHints.map(function(h){
    return '<span class="scr-sec-hint-tag">'+esc(h)+'<span class="rm" onclick="event.stopPropagation();_scrRemoveHint(\''+id+'\',\''+esc(h)+'\')">&#10005;</span></span>';
  }).join('');
  if(inp)inp.value='';
}

function _scrRemoveHint(id,hint){
  var d=scraperDomains.find(function(x){return x.id===id;});
  if(!d||!d.sectionHints)return;
  d.sectionHints=d.sectionHints.filter(function(h){return h!==hint;});
  _saveScraperDomains();
  var hintEl=document.getElementById('scr_hints_'+id);
  if(hintEl)hintEl.innerHTML=d.sectionHints.length?d.sectionHints.map(function(h){
    return '<span class="scr-sec-hint-tag">'+esc(h)+'<span class="rm" onclick="event.stopPropagation();_scrRemoveHint(\''+id+'\',\''+esc(h)+'\')">&#10005;</span></span>';
  }).join(''):'<span style="font-size:11px;color:var(--text3);font-style:italic">None \u2014 AI auto-detects</span>';
}

function _scraperAddDomain(){
  var url=(document.getElementById('scraperNewUrl').value||'').trim();
  var pk=(document.getElementById('scraperNewPlat').value||'').trim();
  var hintsRaw=(document.getElementById('scraperNewHints').value||'').trim();
  if(!url||!pk){alert('Please enter a URL and select a platform.');return;}
  if(!/^https?:\/\//.test(url)){alert('URL must start with http:// or https://');return;}
  if(scraperDomains.some(function(d){return d.url===url&&d.platformKey===pk;})){alert('This URL is already configured for this platform.');return;}
  var hints=hintsRaw?hintsRaw.split(',').map(function(h){return h.trim();}).filter(Boolean):[];
  scraperDomains.push({id:_scraperUUID(),url:url,platformKey:pk,enabled:true,sectionHints:hints,lastFetched:null,cmdCount:0,lastError:null});
  _saveScraperDomains();_renderScraperPills();
  var msg=document.getElementById('scraperAddMsg');
  if(msg){msg.textContent='\u2713 Domain added! Click Run Fetch Now to scrape it.';msg.style.display='block';}
  setTimeout(function(){_renderScraperModal();},900);
}

function _scraperDelDomain(id){
  if(!confirm('Remove this domain from the scraper?'))return;
  scraperDomains=scraperDomains.filter(function(d){return d.id!==id;});
  _saveScraperDomains();_renderScraperPills();_renderScraperModal();
}

// ===== FETCH FLOW =====
var _fetchAbort=false;

async function openFetchFlow(){
  var active=scraperDomains.filter(function(d){return d.enabled!==false;});
  if(!scraperDomains.length){openScraperSettings();return;}
  if(!active.length){alert('All domains are disabled. Enable at least one in Scraper Settings.');return;}
  _fetchAbort=false;
  var btn=document.getElementById('fetchBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin">&#9889;</span> Fetching\u2026';}
  _showFetchModal(active.length);
  var totalAdded=0;
  for(var i=0;i<active.length;i++){
    if(_fetchAbort)break;
    _fetchProgress('Domain '+(i+1)+' of '+active.length+': '+active[i].url.replace(/^https?:\/\//,'').substring(0,40),Math.round(5+(i/active.length)*85));
    var n=await _scrapeDomain(active[i]);
    totalAdded+=n;
  }
  _fetchProgress('\u2713 Done \u2014 '+totalAdded+' new command'+(totalAdded!==1?'s':'')+' added',100);
  var doneBtn=document.getElementById('fetchDoneBtn');
  if(doneBtn)doneBtn.style.display='';
  if(btn){btn.disabled=false;btn.innerHTML='<span>&#9889;</span> Fetch More Commands';}
}

async function _scrapeDomain(domain){
  var platLabel=RAW[domain.platformKey]?RAW[domain.platformKey].label:domain.platformKey;
  var shortUrl=domain.url.replace(/^https?:\/\//,'').replace(/\/.*$/,'');
  _fetchLog('\u2500\u2500 '+shortUrl+' \u2192 '+platLabel,'info');

  // Decide fetch strategy: Worker crawl > Worker single > proxy fallback
  var pages=[];

  if(scraperWorkerUrl){
    // ── Worker path ──────────────────────────────────────────────────────
    _fetchLog('Using Cloudflare Worker\u2026','info');
    var workerBase=scraperWorkerUrl.replace(/\/+$/,'');
    try{
      // Try /crawl first — follows links across the section
      _fetchLog('Crawling via Worker (multi-page)\u2026','dim');
      var crawlResp=await fetch(workerBase+'/crawl',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({url:domain.url,maxPages:domain.maxPages||30,platform:platLabel}),
        signal:AbortSignal.timeout(55000)
      });
      var crawlData=await crawlResp.json();
      if(crawlData.ok&&crawlData.pages&&crawlData.pages.length){
        pages=crawlData.pages.filter(function(p){return p.text&&!p.error;});
        _fetchLog('Worker crawled '+crawlData.pagesVisited+' pages, got '+pages.length+' with content'+(crawlData.queueRemaining?' ('+crawlData.queueRemaining+' more available)':''),'ok');
      } else {
        throw new Error(crawlData.error||'Crawl returned no pages');
      }
    } catch(crawlErr){
      _fetchLog('Crawl failed: '+crawlErr.message+' \u2014 trying single fetch\u2026','warn');
      try{
        var fetchResp=await fetch(workerBase+'/fetch',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({url:domain.url}),
          signal:AbortSignal.timeout(20000)
        });
        var fetchData=await fetchResp.json();
        if(fetchData.ok&&fetchData.pages&&fetchData.pages.length){
          pages=fetchData.pages;
          _fetchLog('Worker fetched 1 page ('+fetchData.totalChars+' chars)','ok');
        } else {
          throw new Error(fetchData.error||'Fetch returned no content');
        }
      } catch(fetchErr){
        _fetchLog('Worker fetch also failed: '+fetchErr.message,'err');
        domain.lastError=fetchErr.message;
      }
    }
  }

  // ── Direct proxy fallback (if no worker or worker failed) ────────────
  if(!pages.length){
    _fetchLog(scraperWorkerUrl?'Falling back to CORS proxies\u2026':'Trying CORS proxies (no Worker configured)\u2026','warn');
    var pageText='';var fetchOk=false;
    var proxies=['https://api.allorigins.win/get?url=','https://corsproxy.io/?'];
    for(var pi=0;pi<proxies.length&&!fetchOk;pi++){
      try{
        _fetchLog('Proxy '+(pi+1)+'\u2026','dim');
        var resp=await fetch(proxies[pi]+encodeURIComponent(domain.url),{signal:AbortSignal.timeout(14000)});
        if(!resp.ok)throw new Error('HTTP '+resp.status);
        var json=await resp.json();
        var raw=json.contents||json.body||'';
        var tmp=document.createElement('div');tmp.innerHTML=raw;
        pageText=(tmp.innerText||tmp.textContent||'').replace(/\s{3,}/g,'\n\n').trim();
        if(pageText.length>10000)pageText=pageText.substring(0,10000)+'\u2026';
        _fetchLog('Proxy OK: '+pageText.length+' chars','ok');
        fetchOk=true;
      } catch(err){ _fetchLog('Proxy '+(pi+1)+' failed: '+err.message,'warn'); }
    }
    if(!fetchOk){
      pageText='URL: '+domain.url+'\nPlatform: '+platLabel;
      _fetchLog('URL-only mode (all proxies blocked)','warn');
    }
    pages=[{url:domain.url,title:'',text:pageText}];
  }

  // ── Build dedup set ───────────────────────────────────────────────────
  var existingCmds=new Set();
  if(RAW[domain.platformKey])Object.keys(RAW[domain.platformKey].sections).forEach(function(sec){
    RAW[domain.platformKey].sections[sec].forEach(function(c){existingCmds.add(c[0].trim().toLowerCase());});
  });
  _fetchLog(existingCmds.size+' existing commands in knowledge base','dim');

  // ── Build AI context ──────────────────────────────────────────────────
  var sectionList=RAW[domain.platformKey]?Object.keys(RAW[domain.platformKey].sections):[];
  var hints=(domain.sectionHints&&domain.sectionHints.length)?domain.sectionHints:[];
  var allSec=sectionList.concat(hints.filter(function(h){return sectionList.indexOf(h)===-1;}));

  var sysPrompt='You are a CLI command extractor for network/infrastructure documentation. Extract every CLI command from the provided text. Return a JSON array ONLY \u2014 no markdown, no prose. Each element: {"cmd":"exact syntax with <placeholders>","desc":"brief description under 15 words","type":"show|config|troubleshooting","section":"category name"}. Type rules: show=read-only/informational; config=changes settings or state; troubleshooting=debug/diagnostic/test. Use these sections when appropriate: '+allSec.join(', ')+(allSec.length?'. Create a new section name if none fits.':'')+' Do not include incomplete fragments or non-commands.';

  // ── Send pages to AI in batches ───────────────────────────────────────
  var allExtracted=[];
  var BATCH_CHARS=9000; // chars per AI call
  var batchText='';var batchPages=[];

  async function flushBatch(){
    if(!batchText.trim())return;
    var userMsg='Platform: '+platLabel+(hints.length?'\nSection hints: '+hints.join(', '):'')+
      '\nPages: '+batchPages.join(', ')+'\n\nContent:\n'+batchText+'\n\nReturn JSON array of all CLI commands found. JSON only.';
    try{
      var prov=AI_PROVIDERS[scraperAiProvider]||AI_PROVIDERS.openrouter;
      var modelLabel=(scraperAiModel||prov.model)==='openrouter/free'?'Free Router':esc(scraperAiModel||prov.model);
      _fetchLog('AI batch ('+prov.name+' / '+modelLabel+'): '+batchPages.length+' page(s), '+batchText.length+' chars…','dim');
      var rawText=await _callAI(sysPrompt,userMsg);
      rawText=rawText.replace(/^```[\w]*\n?/,'').replace(/\n?```$/,'').trim();
      var extracted=JSON.parse(rawText);
      if(Array.isArray(extracted)){
        allExtracted=allExtracted.concat(extracted);
        _fetchLog('Batch extracted '+extracted.length+' commands','ok');
      }
    } catch(err){
      _fetchLog('AI batch error: '+err.message,'err');
      domain.lastError=err.message;
    }
    batchText='';batchPages=[];
  }

  for(var pi=0;pi<pages.length;pi++){
    var page=pages[pi];
    if(!page.text)continue;
    var shortPageUrl=page.url.replace(/^https?:\/\//,'').replace(/^[^/]+/,'');
    if(batchText.length+page.text.length>BATCH_CHARS&&batchText.length>0){
      await flushBatch();
    }
    batchText+=(batchText?'\n\n--- Page: '+shortPageUrl+' ---\n':'')+page.text;
    batchPages.push(shortPageUrl||page.url);
  }
  await flushBatch();

  _fetchLog('Total AI extracted: '+allExtracted.length+' commands across '+pages.length+' pages','info');

  // ── Insert new commands ───────────────────────────────────────────────
  var added=0,skipped=0,newSections=[];
  allExtracted.forEach(function(item){
    if(!item||!item.cmd)return;
    var norm=item.cmd.trim().toLowerCase();
    if(existingCmds.has(norm)){skipped++;return;}
    var sec=(item.section||'General').trim();
    var ctype=(['show','config','troubleshooting'].indexOf(item.type||'')!==-1)?item.type:'show';
    var desc=(item.desc||'').trim().substring(0,120);
    if(!RAW[domain.platformKey]){RAW[domain.platformKey]={label:platLabel,badge:'badge-ns',short:platLabel.substring(0,8),sections:{},_custom:true};}
    if(!RAW[domain.platformKey].sections[sec]){
      RAW[domain.platformKey].sections[sec]=[];
      if(!RAW[domain.platformKey]._customSections)RAW[domain.platformKey]._customSections={};
      RAW[domain.platformKey]._customSections[sec]=true;
      newSections.push(sec);
    }
    RAW[domain.platformKey].sections[sec].push([item.cmd.trim(),desc,ctype]);
    existingCmds.add(norm);added++;
  });

  domain.lastFetched=Date.now();domain.cmdCount=(domain.cmdCount||0)+added;
  if(!domain.lastError)domain.lastError=null;
  scraperHistory.unshift({ts:Date.now(),domainId:domain.id,url:domain.url,platLabel:platLabel,
    added:added,skipped:skipped,newSections:newSections,pagesVisited:pages.length,error:domain.lastError||null});
  _saveScraperDomains();
  if(added>0){_saveToStorage();_rebuildStore();renderStats();renderTabs();render();}
  _fetchLog(added+' added \u00b7 '+skipped+' skipped'+(newSections.length?' \u00b7 new sections: '+newSections.join(', '):''),'ok');

  // Result card in modal
  var res=document.getElementById('fetchResults');
  if(res){
    var html=res.innerHTML;
    html+='<div class="scr-result-card">'+
      '<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px">'+
        '<span style="width:8px;height:8px;border-radius:50%;background:'+(domain.lastError?'#f87171':'#22c55e')+';display:inline-block;flex-shrink:0"></span>'+
        '<strong style="font-size:12px;color:var(--text)">'+esc(shortUrl)+'</strong>'+
        '<span style="font-size:11px;color:var(--text3)">\u2192 '+esc(platLabel)+'</span>'+
        (pages.length>1?'<span style="font-size:10.5px;color:var(--text3);margin-left:auto">'+pages.length+' pages crawled</span>':'')+
      '</div>'+
      (domain.lastError?
        '<div style="font-size:11px;color:#f87171">'+esc(domain.lastError)+'</div>':
        '<div style="font-size:11.5px;color:var(--text2)">'+
          '<span style="color:#22c55e;font-weight:700">+'+added+'</span> commands added'+
          (skipped?' \u00b7 '+skipped+' dupes skipped':'')+
          (newSections.length?' \u00b7 <span style="color:#60a5fa">'+newSections.length+' new section'+(newSections.length!==1?'s':'')+': '+esc(newSections.join(', '))+'</span>':'')+
        '</div>')+
    '</div>';
    res.innerHTML=html;
  }
  return added;
}

async function _testAiKey(){

    var body=p.formatReq(model,'You are a test assistant. Reply with exactly: {"ok":true}','Reply with exactly: {"ok":true} — nothing else.');
    var resp=await fetch(p.url,{method:'POST',headers:hdrs,body:JSON.stringify(body),signal:AbortSignal.timeout(15000)});

    if(data.error)throw new Error(data.error.message||data.error.code||JSON.stringify(data.error));
    var txt=p.extractText(data)||'';
    var usedModel=(data.model&&data.model!==model)?data.model:model;
    if(st)st.innerHTML='<span style="color:#22c55e">&#10003; '+p.name+' OK'+(usedModel?' — routed to: '+esc(usedModel):'')+'</span>';
  }catch(err){

  }
}

/**
 * Core AI call — used by both flushBatch and _testScrape.
 * Returns extracted text string from whichever provider is configured.
 */
async function _callAI(systemPrompt, userMsg){
  if(!scraperAiKey) throw new Error('No AI API key configured. Add one in Scraper Settings.');
  var p=AI_PROVIDERS[scraperAiProvider]||AI_PROVIDERS.openrouter;
  var model=scraperAiModel||p.model;
  var hdrs=Object.assign({'Content-Type':'application/json','Authorization':'Bearer '+scraperAiKey},p.extraHeaders(scraperAiKey));
  var body=p.formatReq(model,systemPrompt,userMsg);
  var resp=await fetch(p.url,{method:'POST',headers:hdrs,body:JSON.stringify(body),signal:AbortSignal.timeout(30000)});
  var data=await resp.json();
  if(data.error)throw new Error(data.error.message||data.error.code||JSON.stringify(data.error));
  return p.extractText(data)||'[]';
}

    var allSec=sectionList.concat(hints.filter(function(h){return sectionList.indexOf(h)===-1;}));
    var sysPrv='Extract CLI commands from docs. JSON array only. Max 10 items. Each: {cmd,desc,type (show|config|troubleshooting),section}. Sections: '+allSec.join(', ')+'.';
    var usrPrv='Platform: '+platLabel+(hints.length?'\nHints: '+hints.join(', '):'')+'\n\n'+pageText+'\n\nExtract up to 10 CLI commands.';
    var rawText=await _callAI(sysPrv,usrPrv);
    rawText=rawText.replace(/^```[\w]*\n?/,'').replace(/\n?```$/,'').trim();
    var items=JSON.parse(rawText);
    if(!Array.isArray(items)||!items.length){
      res.innerHTML='<div style="font-size:11.5px;color:#b45309;background:#fef3e2;border:1px solid #fde68a;border-radius:7px;padding:8px 11px">No commands found in preview. The page may need auth, JS rendering, or contains no CLI documentation.</div>';
      return;
    }
    var html='<div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px">Preview \u2014 '+items.length+' commands found</div>';
    items.forEach(function(item){
      var tc='tb-'+(item.type||'show');
      var tl=item.type==='troubleshooting'?'TSHOOT':item.type==='config'?'CONFIG':'SHOW';
      html+='<div class="scr-result-card">'+
        '<div class="scr-result-cmd">'+esc(item.cmd||'')+'</div>'+
        '<div class="scr-result-desc">'+esc(item.desc||'')+'</div>'+
        '<div class="scr-result-meta"><span class="type-badge '+tc+'">'+tl+'</span><span style="font-size:10.5px;color:var(--text3)">&#128193; '+esc(item.section||'General')+'</span></div>'+
      '</div>';
    });
    res.innerHTML=html;
  } catch(err){
    res.innerHTML='<div style="font-size:11.5px;color:#b91c1c;background:#fde8e8;border:1px solid #fca5a5;border-radius:7px;padding:8px 11px">&#9888; '+esc(err.message)+'</div>';
  }
}

// Init scraper on boot
_loadScraperDomains(function(){_renderScraperPills();});

</script>
