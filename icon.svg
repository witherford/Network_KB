<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
  </defs>
  <!-- background — full-bleed, masked-icon safe (icon must reach edges for "any maskable" purpose) -->
  <rect width="512" height="512" rx="0" fill="url(#bg)"/>
  <!-- network mesh -->
  <g stroke="url(#line)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.85">
    <line x1="128" y1="128" x2="256" y2="256"/>
    <line x1="384" y1="128" x2="256" y2="256"/>
    <line x1="128" y1="384" x2="256" y2="256"/>
    <line x1="384" y1="384" x2="256" y2="256"/>
    <line x1="128" y1="128" x2="384" y2="128"/>
    <line x1="128" y1="384" x2="384" y2="384"/>
    <line x1="128" y1="128" x2="128" y2="384"/>
    <line x1="384" y1="128" x2="384" y2="384"/>
  </g>
  <!-- nodes -->
  <g fill="#38bdf8">
    <circle cx="128" cy="128" r="22"/>
    <circle cx="384" cy="128" r="22"/>
    <circle cx="128" cy="384" r="22"/>
    <circle cx="384" cy="384" r="22"/>
  </g>
  <!-- centre node -->
  <circle cx="256" cy="256" r="40" fill="#0ea5e9" stroke="#e0f2fe" stroke-width="6"/>
  <!-- centre dot -->
  <circle cx="256" cy="256" r="14" fill="#e0f2fe"/>
</svg>
