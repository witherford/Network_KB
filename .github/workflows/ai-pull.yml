# Auto-generated by the Network KB settings page. Do not edit by hand — changes here
# will be overwritten the next time admin saves settings.
name: ai-pull

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

jobs:
  pull:
    if: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run AI pull
        env:
          SETTINGS_PASSWORD: ${{ secrets.SETTINGS_PASSWORD }}
        run: node scripts/ai-pull.mjs
      - name: Commit and push
        run: |
          git config user.name "ai-pull-bot"
          git config user.email "ai-pull-bot@users.noreply.github.com"
          git add data/ || true
          if ! git diff --cached --quiet; then
            git commit -m "ai-pull: scheduled refresh"
            git push
          fi
