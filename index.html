<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Network Knowledge Base</title>
<meta name="description" content="IT engineer toolkit and command reference — works offline, installs as an app.">
<meta name="theme-color" content="#0c4a6e" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#0ea5e9" media="(prefers-color-scheme: light)">
<meta name="color-scheme" content="dark light">

<!-- PWA: manifest + icons -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="mask-icon" href="icon-monochrome.svg" color="#0ea5e9">

<!-- iOS / Safari standalone hints -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Network KB">
<meta name="application-name" content="Network KB">

<link rel="stylesheet" href="css/themes.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>
<header class="app-header">
  <div class="brand">
    <h1>Network Knowledge Base</h1>
    <p class="brand-sub">IT engineer toolkit &amp; command reference</p>
  </div>
  <nav class="main-nav" id="mainNav" role="tablist" aria-label="Primary">
    <button class="nav-tab" data-page="commands" role="tab">Commands</button>
    <button class="nav-tab" data-page="software" role="tab">Software Releases</button>
    <button class="nav-tab" data-page="guides" role="tab">Guides</button>
    <button class="nav-tab" data-page="cves" role="tab">CVE's and bugs</button>
    <button class="nav-tab" data-page="toolkit" role="tab">Toolkit</button>
  </nav>
  <div class="header-actions">
    <div class="ver-cluster" id="verCluster" title="App version">
      <div class="ver-row">
        <span class="ver-current" id="verCurrent">v…</span>
        <button class="icon-btn ver-check" id="verCheckBtn" title="Check for updates">⟳ Check for updates</button>
      </div>
      <div class="ver-latest" id="verLatest" hidden></div>
      <div class="visits-pill" id="visitsPill" hidden title="Total visits since the counter was first started"></div>
    </div>
    <button class="icon-btn pwa-install-btn" id="pwaInstallBtn" hidden title="Install as an app">⤓ Install</button>
    <button class="icon-btn" id="editModeBtn" title="Enter edit mode">Edit</button>
    <button class="icon-btn" id="themeBtn" title="Toggle theme">Theme</button>
    <button class="icon-btn" id="prefsBtn" title="Display preferences">Aa</button>
  </div>
</header>

<main id="pageRoot" class="page-root" aria-live="polite"></main>

<div id="modalRoot"></div>
<div id="toastRoot" class="toast-root" aria-live="polite"></div>

<!-- Update-available banner (shown by the SW registration script) -->
<div id="pwaUpdateBanner" class="pwa-update-banner" hidden role="status" aria-live="polite">
  <span>A new version is available.</span>
  <button class="btn sm primary" id="pwaUpdateReload">Reload</button>
  <button class="btn sm ghost" id="pwaUpdateDismiss">Later</button>
</div>

<script type="module" src="js/app.js"></script>
<script type="module" src="js/pwa.js"></script>
</body>
</html>
